name: Build Ronin Kernel Android 12-5.10 (Marble/Ingres)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl make gcc clang bc libssl-dev flex bison libelf-dev lld python3 zip
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "~/bin" >> $GITHUB_PATH

      - name: Sync GKI Source
        run: |
          mkdir -p ${{ github.workspace }}/workspace
          cd ${{ github.workspace }}/workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle
          rm -rf .repo

      - name: Integrate KernelSU & SUSFS
        run: |
          cd ${{ github.workspace }}/workspace/common
          # Instal KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          
          # Clone SUSFS
          git clone --depth=1 -b gki-android12-5.10 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu
          
          # Patch KernelSU
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU && patch -p1 < 10_enable_susfs_for_ksu.patch && cd ..
          
          # Patch Kernel Source
          cp ../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-gki-android12-5.10.patch

      - name: Update Defconfig
        run: |
          cd ${{ github.workspace }}/workspace/common
          echo 'CONFIG_LOCALVERSION="-Ronin-Kernel-MultiDevice"' >> arch/arm64/configs/gki_defconfig
          cat <<EOF >> arch/arm64/configs/gki_defconfig
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF

      - name: Build Kernel
        run: |
          cd ${{ github.workspace }}/workspace
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Package AnyKernel3
        run: |
          cd ${{ github.workspace }}/workspace
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git
          
          # Konfigurasi untuk Marble dan Ingres
          sed -i 's/kernel.string=.*/kernel.string=Ronin Kernel for Marble\/Ingres/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=marble/g' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=ingres/g' anykernel.sh
          sed -i 's/block=.*/block=auto/g' anykernel.sh
          
          cp ../out/android12-5.10/dist/Image .
          zip -r9 "../Ronin-Kernel-Marble-Ingres.zip" *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ronin-Kernel-Marble-Ingres
          path: workspace/Ronin-Kernel-Marble-Ingres.zip
