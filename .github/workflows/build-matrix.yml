name: Build Marble Kernel

on:
  workflow_dispatch:
    inputs:
      build_none:
        description: "Build: none (baseline no-root)"
        type: boolean
        default: false
      build_kernelsu:
        description: "Build: KernelSU (no SUSFS)"
        type: boolean
        default: false
      build_kernelsu_next:
        description: "Build: KernelSU-Next"
        type: boolean
        default: false
      build_sukisu_ultra:
        description: "Build: SukiSU Ultra"
        type: boolean
        default: false
      build_resukisu:
        description: "Build: ReSukiSU"
        type: boolean
        default: false
      enable_susfs:
        description: "Enable SUSFS (applies to KSUNext, SukiSU Ultra, ReSukiSU)"
        type: boolean
        default: false
      susfs_version:
        description: SUSFS preset version
        type: choice
        default: v2.2.0
        options:
          - v2.2.0
          - v2.1.0
          - custom
      susfs_ref:
        description: "SUSFS branch/tag/commit (only for custom version)"
        required: false
        default: ""
      source_repo:
        description: Kernel source repository
        required: true
        default: yudharn/android_kernel_xiaomi_marble
      source_ref:
        description: Kernel source branch, tag, or commit
        required: true
        default: melt-Guxin12-A
      build_scope:
        description: Build target set
        type: choice
        default: image-only
        options:
          - image-only
          - full
      toolchain:
        description: Compiler toolchain
        type: choice
        default: android-r416183b
        options:
          - android-r416183b
          - llvm-22.1.8
          - clang-19-pgo
      enable_ccache:
        description: Enable ccache
        type: boolean
        default: true
      create_draft_release:
        description: Create a draft GitHub release when the build succeeds
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.enable_susfs }}-${{ inputs.build_scope }}
  cancel-in-progress: false

jobs:
  setup:
    name: Generate matrix and validate policy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout builder
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          
      - name: Checkout AnyKernel3 packer
        uses: actions/checkout@v5
        with:
          repository: Guxin12/android_kernel_xiaomi_marble
          ref: Anykernel3
          fetch-depth: 1
          path: anykernel   

      - name: Validate builder policy
        run: |
          for test_script in tests/test-*.sh; do
            env -u SOURCE_REPO -u SOURCE_REF -u MANAGER -u MANAGER_REF -u ENABLE_SUSFS \
              -u SUSFS_VERSION -u SUSFS_KERNEL_BRANCH -u SUSFS_REF -u SUSFS_EXPECTED_VERSION \
              bash "${test_script}"
          done

      - name: Generate build matrix
        id: gen
        env:
          BUILD_NONE: ${{ inputs.build_none }}
          BUILD_KERNELSU: ${{ inputs.build_kernelsu }}
          BUILD_KERNELSU_NEXT: ${{ inputs.build_kernelsu_next }}
          BUILD_SUKISU_ULTRA: ${{ inputs.build_sukisu_ultra }}
          BUILD_RESUKISU: ${{ inputs.build_resukisu }}
          ENABLE_SUSFS: ${{ inputs.enable_susfs }}
        run: |
          matrix="$(bash scripts/generate-build-matrix.sh)"
          echo "Generated matrix: ${matrix}"

  build:
    name: ${{ matrix.label }}
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-core.yml
    with:
      source_repo: ${{ inputs.source_repo }}
      source_ref: ${{ inputs.source_ref }}
      manager: ${{ matrix.manager }}
      manager_ref: ""
      enable_susfs: ${{ fromJSON(matrix.enable_susfs) }}
      susfs_version: ${{ inputs.susfs_version }}
      susfs_kernel_branch: gki-android12-5.10
      susfs_ref: ${{ inputs.susfs_ref }}
      susfs_expected_version: ""
      build_scope: ${{ inputs.build_scope }}
      toolchain: ${{ inputs.toolchain }}
      enable_ccache: ${{ inputs.enable_ccache }}
      artifact_label: ${{ matrix.label }}
      run_policy_tests: false
      publish_step_summary: false
      
      run: |
          ZIP_NAME="${{ matrix.variant.name }}-marble-ak3.zip"

          # ?? 关键修改：我们 cp Image 到 anykernel/ 目录，然后对其执行 7z 压缩
          # 这样 7z 内部路径就是纯 "Image"
          # anykernel.sh 用 7za x 解压到 ${home}/ 时，文件会落到 ${home}/Image
          # 之前的问题是 7z 打包时有路径前缀，导致解压路径错误

          if [ -f kernel/out/arch/arm64/boot/Image ]; then
            cp kernel/out/arch/arm64/boot/Image anykernel/Image
            echo "? Copied Image to anykernel/"
            echo "   Image size: $(stat -c%s anykernel/Image) bytes"

            cd anykernel
            # 在 anykernel/ 目录下压缩，7z 内部路径就是纯 "Image"
            7z a -mx=9 Image.7z Image

            # 验证 7z 内部结构
            echo "=== 7z internal structure ==="
            7z l Image.7z

            # 模拟 anykernel.sh 的解压逻辑，验证结构
            mkdir -p /tmp/7z_verify
            7z x Image.7z -o/tmp/7z_verify -y
            echo "=== Extracted file ==="
            ls -la /tmp/7z_verify/
            if [ -f /tmp/7z_verify/Image ]; then
              EXTRACTED_SIZE=$(stat -c%s /tmp/7z_verify/Image)
              echo "? Internal path correct: Image ($EXTRACTED_SIZE bytes)"
              if [ "$EXTRACTED_SIZE" -lt 1000000 ]; then
                echo "? ERROR: Image too small!"
                exit 1
              fi
            else
              echo "? ERROR: File not at /tmp/7z_verify/Image"
              find /tmp/7z_verify -type f
              exit 1
            fi
            rm -rf /tmp/7z_verify

            # 删除原始 Image，zip 里只需要 Image.7z
            rm Image

            echo "? Image.7z created: $(stat -c%s Image.7z) bytes"
            cd ..
          else
            echo "? No kernel Image found!"
            exit 1
          fi

          # 验证 AnyKernel3 仓库中预置的其他文件
          echo "=== Checking required pre-built files in AK3 repo ==="
          for f in _modules_hyperos.7z _dtb.7z anykernel.sh tools/ak3-core.sh; do
             if [ -f "anykernel/$f" ]; then
               echo "? Found: $f"
             else
               echo "? MISSING: $f"
             fi
          done

          # 打包
          cd anykernel
          zip -r9 "../$ZIP_NAME" . -x "'.git?*" "*.git" "README*" "*placeholder*"

          echo "=== Zip file created ==="
          ls -lh "../$ZIP_NAME"

          # ?? 最终验证
          echo "=== Verifying zip contents ==="
          unzip -l "../$ZIP_NAME" | grep -E "Image\.7z|_modules_hyperos|_dtb\.7z|anykernel\.sh|update-binary|ak3-core"

          echo "=== DONE ==="
          cd ..
          
          - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
           name: ${{ matrix.variant.name }}-marble-ak3
         path: ${{ matrix.variant.name }}-marble-ak3.zip

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create ZIP-only draft release
        run: |
          tag="marble-hyperos-r${GITHUB_RUN_NUMBER}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "::error::Release ${tag} already exists"
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi

          mapfile -t release_assets < release-assets.txt
          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            echo "::error::No verified ZIP assets were prepared"
            exit 1
          fi

          gh release create "${tag}" "${release_assets[@]}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "Marble Kernel · Stock HyperOS · r${GITHUB_RUN_NUMBER}" \
            --notes-file matrix-summary.md
